<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-Notes Canvas</title>
    <meta name="description" content="LLM-driven HTML canvas.">
    <link rel="stylesheet" href="index.css">
    <script src="lib/dompurify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Add Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container" class="canvas-container">
        <div id="welcome-message" class="system-message">
            <h1>Canvas Ready</h1>
            <p>Tell the LLM what components to build and render here.</p>
        </div>
    </div>

    <!-- Fixed Chat Bar at Bottom -->
    <div class="chat-bar">
        <div class="input-row">
            <button id="btn-mic" class="btn-mic" title="Record Voice">
                <svg class="mic-icon" viewBox="0 0 24 24">
                    <path d="M12,14A3,3 0 0,0 15,11V5A3,3 0 0,0 12,2A3,3 0 0,0 9,5V11A3,3 0 0,0 12,14M17.3,11C17.3,14 14.76,16.2 12,16.2C9.24,16.2 6.7,14 6.7,11H5C5,14.41 7.72,17.23 11,17.72V21H13V17.72C16.28,17.23 19,14.41 19,11H17.3Z"/>
                </svg>
            </button>
            <textarea id="chat-input" placeholder="Type instructions or dictate..." rows="1"></textarea>
            <button id="btn-send-message" class="btn-send" title="Send message">
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/>
                </svg>
            </button>
        </div>
        <div id="recording-status" class="recording-status" style="display: none;">
            <span class="pulse"></span> Recording...
        </div>
        <div id="health-indicator" class="health-dot offline" title="System Status"></div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
